name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows builds
          - os: windows-latest
            arch: amd64
            goos: windows
            goarch: amd64
            binary_name: bpmn-to-image.exe
            artifact_name: bpmn-to-image-windows-amd64.exe

          - os: windows-latest
            arch: arm64
            goos: windows
            goarch: arm64
            binary_name: bpmn-to-image.exe
            artifact_name: bpmn-to-image-windows-arm64.exe

          # Linux builds
          - os: ubuntu-latest
            arch: amd64
            goos: linux
            goarch: amd64
            binary_name: bpmn-to-image
            artifact_name: bpmn-to-image-linux-amd64

          - os: ubuntu-latest
            arch: arm64
            goos: linux
            goarch: arm64
            binary_name: bpmn-to-image
            artifact_name: bpmn-to-image-linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -o ${{ matrix.artifact_name }} ./...

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: Flatten artifacts
        run: |
          mkdir -p ./release
          find ./dist -type f -exec mv {} ./release/ \;

      - name: Generate checksums
        run: |
          cd ./release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
